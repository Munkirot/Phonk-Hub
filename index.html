<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHONK HUB</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050816;
color:white;
overflow:hidden;
}

/* INTRO */

.screen{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#1a0040,#000);
transition:0.6s;
z-index:999;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.1);
}

.logo{
width:180px;
height:180px;
border-radius:50%;
border:5px solid #00ff88;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:bold;
color:#00ff88;
box-shadow:0 0 20px #00ff88;
animation:intro 1.6s ease;
}

@keyframes intro{
0%{
transform:scale(0) rotate(0);
opacity:0;
}
100%{
transform:scale(1) rotate(360deg);
opacity:1;
}
}

/* APP */

.app{
display:flex;
flex-direction:column;
height:100vh;
background:#0a0a1a;
}

.header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

.title{
font-size:22px;
font-weight:bold;
color:#00ff88;
}

.search{
padding:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
width:200px;
outline:none;
}

.headerRight{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#00ff88;
color:black;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
opacity:0.9;
transform:scale(1.03);
}

/* SONGS */

.list{
flex:1;
overflow:auto;
padding:10px;
padding-bottom:120px;
}

.song{
background:#111;
padding:12px;
margin-bottom:10px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
border:1px solid rgba(255,255,255,0.04);
transition:0.2s;
}

.song:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(0,255,136,0.08);
}

.songLeft{
display:flex;
gap:10px;
align-items:center;
flex:1;
}

.song img{
width:55px;
height:55px;
border-radius:10px;
}

.songInfo{
display:flex;
flex-direction:column;
align-items:flex-start;
}

.songTitle{
font-weight:bold;
font-size:15px;
}

.songArtist{
font-size:12px;
opacity:0.7;
margin-top:2px;
}

.like{
color:#ff4d6d;
font-weight:bold;
margin-top:5px;
font-size:12px;
}

.plays{
font-size:12px;
opacity:0.7;
margin-top:3px;
}

.songButtons{
display:flex;
gap:6px;
flex-wrap:wrap;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:15px;
border-top:1px solid #222;
z-index:100;
}

.nowPlayingTitle{
font-weight:bold;
font-size:16px;
}

.nowPlayingArtist{
font-size:12px;
opacity:0.7;
}

/* VISITORS */

#visitorCounter{
position:fixed;
left:10px;
bottom:85px;
background:#111;
padding:8px 12px;
border-radius:10px;
font-size:14px;
z-index:999;
box-shadow:0 0 10px rgba(0,255,136,0.3);
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
backdrop-filter:blur(4px);
}

.modalBox{
background:#111;
padding:20px;
border-radius:16px;
width:90%;
max-width:500px;
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.modalBox input,
.modalBox textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1b1b1b;
color:white;
}

/* COMMENTS */

.commentsContainer{
margin-top:15px;
max-height:300px;
overflow:auto;
padding-right:5px;
}

.commentCard{
padding:12px;
border-radius:12px;
margin-bottom:10px;
animation:fadeIn 0.2s ease;
}

.commentTop{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.commentAvatar{
width:30px;
height:30px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
color:black;
font-size:14px;
}

.commentName{
font-size:13px;
font-weight:bold;
}

.commentText{
font-size:14px;
line-height:1.4;
word-break:break-word;
}

.commentInputWrap{
margin-top:15px;
background:#1a1a1a;
padding:12px;
border-radius:12px;
}

.commentInputModern{
width:100%;
min-height:90px;
resize:none;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#111;
color:white;
font-size:14px;
}

.commentButtons{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:10px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="screen" id="intro">
<div class="logo">PHB</div>
</div>

<div class="app hidden" id="app">

<div class="header">

<div class="title">
PHONK HUB
</div>

<div class="headerRight">

<button onclick="toggleLogin()" id="loginBtn">
Login
</button>

<input
class="search"
id="search"
placeholder="Search..."
oninput="render()">

<button
onclick="togglePopular()"
id="popularBtn">
The Most Popular
</button>

<button onclick="openAdd()">
+ Add
</button>

</div>

</div>

<div class="list" id="list"></div>

<div id="visitorCounter">
👥 Loading...
</div>

<div class="player">

<div class="nowPlayingTitle" id="pTitle">
No song selected
</div>

<div class="nowPlayingArtist" id="pArtist">
-
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
addDoc,
doc,
updateDoc,
deleteDoc,
increment,
arrayUnion,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "phonk-hub.firebaseapp.com",
projectId: "phonk-hub",
storageBucket: "phonk-hub.firebasestorage.app",
messagingSenderId: "832888450027",
appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const songsRef = collection(db,"songs");

const statsRef = doc(db,"stats","visits");

window.songs = [];

let popularMode = false;

window.currentUser =
localStorage.getItem("phonkUser") || null;

window.userColor =
localStorage.getItem("phonkUserColor") || null;

const userColors = [
"#ff2b55",
"#00ff88",
"#00bfff",
"#ff9900",
"#a855f7",
"#ff4444",
"#14b8a6",
"#eab308",
"#ec4899",
"#3b82f6"
];

window.updateLoginButton = ()=>{

const btn =
document.getElementById("loginBtn");

if(window.currentUser){

btn.innerHTML =
"Logout (" +
window.currentUser +
")";

}else{

btn.innerHTML = "Login";

}

};

updateLoginButton();

onSnapshot(songsRef,(snap)=>{

window.songs = snap.docs.map(doc=>({
id:doc.id,
...doc.data()
}));

render();

});

onSnapshot(statsRef,(snap)=>{

if(snap.exists()){

document.getElementById("visitorCounter")
.innerText =
"👥 " +
snap.data().count +
" visitors";

}

});

async function updateVisitors(){

try{

const snap =
await getDoc(statsRef);

if(!snap.exists()){

await setDoc(statsRef,{
count:1
});

return;

}

await updateDoc(statsRef,{
count: increment(1)
});

}catch(err){

console.log(err);

}

}

updateVisitors();

/* LOGIN */

window.toggleLogin = ()=>{

if(window.currentUser){

localStorage.removeItem("phonkUser");
localStorage.removeItem("phonkUserColor");

window.currentUser = null;
window.userColor = null;

updateLoginButton();

render();

return;

}

const modal =
document.createElement("div");

modal.className = "modal";

modal.innerHTML = `

<div class="modalBox">

<h2>Login</h2>

<input
id="loginName"
placeholder="Username">

<div class="commentButtons">

<button onclick="closeModal()">
Close
</button>

<button onclick="loginUser()">
Login
</button>

</div>

</div>

`;

document.body.appendChild(modal);

};

window.loginUser = ()=>{

const name =
document
.getElementById("loginName")
.value
.trim();

if(!name) return;

const randomColor =
userColors[
Math.floor(
Math.random() * userColors.length
)
];

window.currentUser = name;
window.userColor = randomColor;

localStorage.setItem(
"phonkUser",
name
);

localStorage.setItem(
"phonkUserColor",
randomColor
);

updateLoginButton();

closeModal();

render();

};

/* POPULAR */

window.togglePopular = ()=>{

popularMode = !popularMode;

document.getElementById("popularBtn")
.innerText =
popularMode
? "Normal"
: "The Most Popular";

render();

};

/* RENDER */

window.render = ()=>{

const q =
document.getElementById("search")
.value
.toLowerCase();

const list =
document.getElementById("list");

list.innerHTML = "";

let filteredSongs = window.songs

.filter(song=>
(song.title || "")
.toLowerCase()
.includes(q)
);

if(popularMode){

filteredSongs.sort(
(a,b)=>
(b.plays || 0) - (a.plays || 0)
);

}

filteredSongs.forEach(song=>{

list.innerHTML += `

<div class="song">

<div class="songLeft">

<img src="https://picsum.photos/100?random=${song.id}">

<div class="songInfo">

<div class="songTitle">
${song.title}
</div>

<div class="songArtist">
${song.artist}
</div>

<div class="like">
❤️ ${song.likes || 0}
</div>

<div class="plays">
▶ ${song.plays || 0} plays
</div>

</div>

</div>

<div class="songButtons">

<button onclick="playSong('${song.title}','${song.artist}','${song.link}','${song.id}')">
Play
</button>

<button onclick="likeSong('${song.id}')">
Like
</button>

<div style="position:relative;">

<div style="
position:absolute;
top:-8px;
right:-8px;
background:#ff2b55;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:20px;
font-weight:bold;
">

${(song.comments || []).length}

</div>

<button onclick="openComments('${song.id}')">
Comments
</button>

</div>

<button onclick="deleteSong('${song.id}')">
Delete
</button>

</div>

</div>

`;

});

};

/* PLAY */

window.playSong = async (
title,
artist,
link,
id
)=>{

document.getElementById("pTitle")
.innerText = title;

document.getElementById("pArtist")
.innerText = artist;

await updateDoc(
doc(db,"songs",id),
{
plays: increment(1)
}
);

window.open(link,"_blank");

};

/* LIKE */

window.likeSong = async(id)=>{

let likedSongs =
JSON.parse(
localStorage.getItem("likedSongs")
) || {};

if(!likedSongs[id]){

likedSongs[id] = 0;

}

if(likedSongs[id] >= 7){

alert("Max 7 likes reached");

return;

}

likedSongs[id]++;

localStorage.setItem(
"likedSongs",
JSON.stringify(likedSongs)
);

await updateDoc(
doc(db,"songs",id),
{
likes: increment(1)
}
);

};

/* COMMENTS */

window.openComments = (id)=>{

const song =
window.songs.find(
s=>s.id===id
);

const modal =
document.createElement("div");

modal.className = "modal";

modal.innerHTML = `

<div class="modalBox">

<h2 style="
display:flex;
justify-content:space-between;
align-items:center;
">

<span>${song.title}</span>

<span style="
font-size:13px;
background:#ff2b55;
padding:5px 10px;
border-radius:20px;
">
${(song.comments || []).length} comments
</span>

</h2>

<div class="commentsContainer">

${(song.comments || [])

.map((c,index)=>`

<div class="commentCard"
style="
background:${c.color || '#1b1b1b'}22;
border:1px solid ${c.color || '#333'};
box-shadow:0 0 15px ${c.color || '#000'}33;
">

<div class="commentTop">

<div class="commentAvatar"
style="
background:${c.color || '#00ff88'};
">

${index + 1}

</div>

<div class="commentName"
style="
color:${c.color || '#00ff88'};
">

${c.user || "Anonymous"}

</div>

</div>

<div class="commentText">
${c.text || c}
</div>

</div>

`)

.join("")}

</div>

<div class="commentInputWrap">

<textarea
id="commentInput"
class="commentInputModern"
placeholder="Write something..."></textarea>

<div class="commentButtons">

<button onclick="closeModal()">
Close
</button>

<button onclick="addComment('${id}')">
Add Comment
</button>

</div>

</div>

</div>

`;

document.body.appendChild(modal);

};

/* ADD COMMENT */

window.addComment = async(id)=>{

if(!window.currentUser){

alert("Login first");

return;

}

const text =
document
.getElementById("commentInput")
.value;

if(!text) return;

await updateDoc(
doc(db,"songs",id),
{
comments: arrayUnion({
user: window.currentUser,
text:text,
color: window.userColor
})
}
);

closeModal();

};

/* DELETE */

window.deleteSong = async(id)=>{

const pass =
prompt("Password?");

if(pass !== "aletorma")
return;

await deleteDoc(
doc(db,"songs",id)
);

};

/* ADD SONG */

window.openAdd = ()=>{

const modal =
document.createElement("div");

modal.className = "modal";

modal.innerHTML = `

<div class="modalBox">

<h2>Add Song</h2>

<input
id="t"
placeholder="Song title">

<input
id="a"
placeholder="Artist">

<input
id="l"
placeholder="YouTube link">

<input
id="p"
type="password"
placeholder="Password">

<div class="commentButtons">

<button onclick="closeModal()">
Close
</button>

<button onclick="submitSong()">
Add
</button>

</div>

</div>

`;

document.body.appendChild(modal);

};

window.submitSong = async()=>{

const pass =
document.getElementById("p")
.value;

if(pass !== "kingphonk")
return;

const title =
document.getElementById("t")
.value;

const artist =
document.getElementById("a")
.value;

const link =
document.getElementById("l")
.value;

if(!title || !artist || !link)
return;

await addDoc(songsRef,{
title,
artist,
link,
likes:0,
plays:0,
comments:[]
});

closeModal();

};

window.closeModal = ()=>{

document
.querySelectorAll(".modal")
.forEach(m=>m.remove());

};

/* INTRO */

setTimeout(()=>{

document
.getElementById("intro")
.classList.add("hidden");

setTimeout(()=>{

document
.getElementById("app")
.classList.remove("hidden");

},1200);

},1500);

</script>

</body>
</html>
