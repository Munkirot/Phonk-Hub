<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phonk Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }

    #list {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .song {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #1c1c1c;
      border-radius: 10px;
    }

    .play {
      cursor: pointer;
      background: #00ff88;
      padding: 5px 10px;
      border-radius: 6px;
      color: black;
    }

    #addBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🔥 PHONK HUB</header>

<div id="list"></div>

<div id="addBox">
  <input id="title" placeholder="Song title">
  <input id="link" placeholder="YouTube link">
  <button onclick="addSong()">ADD</button>
</div>

<audio id="audio"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "phonk-hub.firebaseapp.com",
  projectId: "phonk-hub",
  storageBucket: "phonk-hub.firebasestorage.app",
  messagingSenderId: "832888450027",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const songsRef = collection(db, "songs");

window.songs = [];

// 🔥 LIVE SYNC (tämä korjaa sun puhelin/kone ongelman)
onSnapshot(songsRef, (snapshot) => {
  window.songs = snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));

  render(window.songs);
});

// ➕ ADD SONG FIRESTOREEN
window.addSong = async () => {
  const title = document.getElementById("title").value;
  const link = document.getElementById("link").value;

  if (!title || !link) return;

  await addDoc(songsRef, {
    title,
    link,
    likes: 0,
    img: "https://picsum.photos/200"
  });

  document.getElementById("title").value = "";
  document.getElementById("link").value = "";
};

// 🎵 PLAY
window.play = (i) => {
  const s = window.songs[i];
  const audio = document.getElementById("audio");

  audio.src = s.link;
  audio.play();
};

// 📜 RENDER
function render(list) {
  const c = document.getElementById("list");
  c.innerHTML = "";

  list.forEach((s, i) => {
    c.innerHTML += `
      <div class="song">
        <div>${s.title}</div>
        <div class="play" onclick="play(${i})">PLAY</div>
      </div>
    `;
  });
}
</script>

</body>
</html>
