<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHONK HUB</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#050816;
color:white;
overflow:hidden;
}

/* INTRO */
.screen{
position:absolute;inset:0;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#1a0040,#000);
transition:0.6s;
}

.hidden{opacity:0;pointer-events:none;transform:scale(1.1);}

.logo{
width:180px;height:180px;border-radius:50%;
border:5px solid #00ff88;
display:flex;justify-content:center;align-items:center;
font-size:40px;
font-weight:bold;
color:#00ff88;
animation:pop 1.6s ease;
}

@keyframes pop{
0%{transform:scale(0) rotate(0);}
100%{transform:scale(1) rotate(360deg);}
}

/* APP */
.app{
display:flex;
flex-direction:column;
height:100vh;
background:#0a0a1a;
}

.header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.5);
}

.title{color:#00ff88;font-weight:bold;font-size:22px;}

.search{
padding:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
width:200px;
}

.list{
flex:1;
overflow:auto;
padding:10px;
padding-bottom:180px;
}

.song{
background:#111;
padding:12px;
margin-bottom:10px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.songLeft{
display:flex;
gap:10px;
align-items:center;
}

.song img{
width:50px;height:50px;border-radius:10px;
}

.like{color:#ff4d6d;font-weight:bold;}

button{
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00ff88;
color:black;
margin-left:5px;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="screen" id="intro">
<div class="logo">PHB</div>
</div>

<!-- APP -->
<div class="app hidden" id="app">

<div class="header">
<div class="title">PHONK HUB</div>
<input class="search" id="search" oninput="render()" placeholder="search">
</div>

<div class="list" id="list"></div>

<div class="player" id="nowPlaying">No song</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
addDoc,
doc,
updateDoc,
deleteDoc,
increment,
arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "phonk-hub.firebaseapp.com",
projectId: "phonk-hub",
storageBucket: "phonk-hub.firebasestorage.app",
messagingSenderId: "832888450027",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const songsRef = collection(db,"songs");

window.songs = [];

/* LIVE DATA */
onSnapshot(songsRef,(snap)=>{
window.songs = snap.docs.map(d=>({id:d.id,...d.data()}));
render();
});

/* RENDER */
window.render = () => {
const q = document.getElementById("search").value?.toLowerCase() || "";
const list = document.getElementById("list");

list.innerHTML = "";

window.songs
.filter(s=>s.title.toLowerCase().includes(q))
.forEach(s=>{

list.innerHTML += `
<div class="song">

<div class="songLeft">
<img src="https://picsum.photos/100?random=${s.id}">
<div>
<div>${s.title}</div>
<div>${s.artist}</div>
<div class="like">❤️ ${s.likes||0}</div>
</div>
</div>

<div>
<button onclick="play('${s.title}')">Play</button>
<button onclick="like('${s.id}')">Like</button>
<button onclick="openComments('${s.id}')">Comments</button>
<button onclick="del('${s.id}')">Delete</button>
</div>

</div>
`;
});
};

/* PLAY */
window.play = (t)=>{
document.getElementById("nowPlaying").innerText="Now Playing: "+t;
};

/* LIKE */
window.like = async (id)=>{
await updateDoc(doc(db,"songs",id),{
likes: increment(1)
});
};

/* COMMENTS */
window.openComments = (id)=>{

const s = window.songs.find(x=>x.id===id);

const m = document.createElement("div");
m.className="screen";

m.innerHTML=`
<div style="background:#111;padding:20px;border-radius:10px;width:90%;max-width:500px;">
<h3>${s.title}</h3>

<div>
${(s.comments||[]).map(c=>`<div>${c}</div>`).join("")}
</div>

<input id="cInput" placeholder="comment">
<button onclick="addC('${id}')">Add</button>
<button onclick="this.parentElement.parentElement.remove()">Close</button>
</div>
`;

document.body.appendChild(m);
};

/* ADD COMMENT */
window.addC = async (id)=>{
const v = document.getElementById("cInput").value;
if(!v) return;

await updateDoc(doc(db,"songs",id),{
comments: arrayUnion(v)
});
};

/* DELETE */
window.del = async (id)=>{
const pass = prompt("Password?");
if(pass !== "aletorma") return;

await deleteDoc(doc(db,"songs",id));
};

/* INTRO */
setTimeout(()=>{
document.getElementById("intro").classList.add("hidden");
setTimeout(()=>{
document.getElementById("app").classList.remove("hidden");
},1200);
},1500);

</script>

</body>
</html>
