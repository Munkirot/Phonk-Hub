<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHONK HUB</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050816;
color:white;
overflow:hidden;
}

/* INTRO */

.screen{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#1a0040,#000);
transition:0.6s;
z-index:999;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.1);
}

.logo{
width:180px;
height:180px;
border-radius:50%;
border:5px solid #00ff88;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:bold;
color:#00ff88;
box-shadow:0 0 20px #00ff88;
animation:intro 1.6s ease;
}

@keyframes intro{
0%{
transform:scale(0) rotate(0);
opacity:0;
}
100%{
transform:scale(1) rotate(360deg);
opacity:1;
}
}

/* APP */

.app{
display:flex;
flex-direction:column;
height:100vh;
background:#0a0a1a;
}

.header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

.title{
font-size:22px;
font-weight:bold;
color:#00ff88;
}

.search{
padding:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
width:200px;
outline:none;
}

.headerRight{
display:flex;
gap:10px;
align-items:center;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#00ff88;
color:black;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

/* SONGS */

.list{
flex:1;
overflow:auto;
padding:10px;
padding-bottom:120px;
}

.song{
background:#111;
padding:12px;
margin-bottom:10px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.songLeft{
display:flex;
gap:10px;
align-items:center;
}

.song img{
width:55px;
height:55px;
border-radius:10px;
}

.songTitle{
font-weight:bold;
font-size:15px;
}

.songArtist{
font-size:12px;
opacity:0.7;
margin-top:2px;
}

.like{
color:#ff4d6d;
font-weight:bold;
margin-top:5px;
}

.songButtons{
display:flex;
gap:6px;
flex-wrap:wrap;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:15px;
border-top:1px solid #222;
z-index:100;
}

.nowPlayingTitle{
font-weight:bold;
font-size:16px;
}

.nowPlayingArtist{
font-size:12px;
opacity:0.7;
}

/* VISITORS */

#visitorCounter{
position:fixed;
left:10px;
bottom:85px;
background:#111;
padding:8px 12px;
border-radius:10px;
font-size:14px;
z-index:999;
box-shadow:0 0 10px rgba(0,255,136,0.3);
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.modalBox{
background:#111;
padding:20px;
border-radius:12px;
width:90%;
max-width:500px;
}

.modalBox h2{
margin-bottom:10px;
}

.modalBox input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#222;
color:white;
}

.comment{
background:#222;
padding:8px;
border-radius:8px;
margin-top:6px;
}

.modalButtons{
display:flex;
gap:10px;
margin-top:10px;
}

</style>
</head>

<body>

<!-- INTRO -->

<div class="screen" id="intro">
<div class="logo">PHB</div>
</div>

<!-- APP -->

<div class="app hidden" id="app">

<div class="header">

<div class="title">
PHONK HUB
</div>

<div class="headerRight">

<input
class="search"
id="search"
placeholder="Search..."
oninput="render()">

<button onclick="openAdd()">
+ Add
</button>

</div>

</div>

<div class="list" id="list"></div>

<!-- VISITORS -->

<div id="visitorCounter">
👥 Loading...
</div>

<!-- PLAYER -->

<div class="player">

<div class="nowPlayingTitle" id="pTitle">
No song selected
</div>

<div class="nowPlayingArtist" id="pArtist">
-
</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
addDoc,
doc,
updateDoc,
deleteDoc,
increment,
arrayUnion,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "phonk-hub.firebaseapp.com",

projectId: "phonk-hub",

storageBucket: "phonk-hub.firebasestorage.app",

messagingSenderId: "832888450027",

appId: "YOUR_APP_ID"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const songsRef = collection(db,"songs");

const statsRef = doc(db,"stats","visits");

/* SONGS */

window.songs = [];

/* LIVE SONGS */

onSnapshot(songsRef,(snap)=>{

window.songs = snap.docs.map(doc=>({
id:doc.id,
...doc.data()
}));

render();

});

/* VISITOR COUNTER */

onSnapshot(statsRef,(snap)=>{

if(snap.exists()){

document.getElementById("visitorCounter")
.innerText =
"👥 " +
snap.data().count +
" visitors";

}

});

async function updateVisitors(){

try{

const snap =
await getDoc(statsRef);

if(!snap.exists()){

await setDoc(statsRef,{
count:1
});

return;

}

await updateDoc(statsRef,{
count: increment(1)
});

}catch(err){

console.log(err);

}

}

updateVisitors();

/* RENDER */

window.render = ()=>{

const q =
document.getElementById("search")
.value
.toLowerCase();

const list =
document.getElementById("list");

list.innerHTML = "";

window.songs

.filter(song=>
(song.title || "")
.toLowerCase()
.includes(q)
)

.forEach(song=>{

list.innerHTML += `

<div class="song">

<div class="songLeft">

<img src="https://picsum.photos/100?random=${song.id}">

<div>

<div class="songTitle">
${song.title}
</div>

<div class="songArtist">
${song.artist}
</div>

<div class="like">
❤️ ${song.likes || 0}
</div>

</div>
</div>

<div class="songButtons">

<button onclick="playSong('${song.title}','${song.artist}','${song.link}')">
Play
</button>

<button onclick="likeSong('${song.id}')">
Like
</button>

<button onclick="openComments('${song.id}')">
Comments
</button>

<button onclick="deleteSong('${song.id}')">
Delete
</button>

</div>

</div>

`;

});

};

/* PLAY */

window.playSong = (
title,
artist,
link
)=>{

document.getElementById("pTitle")
.innerText = title;

document.getElementById("pArtist")
.innerText = artist;

window.open(link,"_blank");

};

/* LIKE LIMIT */

window.likeSong = async(id)=>{

let likedSongs =
JSON.parse(
localStorage.getItem("likedSongs")
) || {};

if(!likedSongs[id]){

likedSongs[id] = 0;

}

if(likedSongs[id] >= 7){

alert("Max 7 likes reached");

return;

}

likedSongs[id]++;

localStorage.setItem(
"likedSongs",
JSON.stringify(likedSongs)
);

await updateDoc(
doc(db,"songs",id),
{
likes: increment(1)
}
);

};

/* COMMENTS */

window.openComments = (id)=>{

const song =
window.songs.find(
s=>s.id===id
);

const modal =
document.createElement("div");

modal.className = "modal";

modal.innerHTML = `

<div class="modalBox">

<h2>${song.title}</h2>

<div>

${(song.comments || [])

.map(c=>`

<div class="comment">
${c}
</div>

`)

.join("")}

</div>

<input
id="commentInput"
placeholder="Write comment...">

<div class="modalButtons">

<button onclick="addComment('${id}')">
Add
</button>

<button onclick="closeModal()">
Close
</button>

</div>

</div>

`;

document.body.appendChild(modal);

};

/* ADD COMMENT */

window.addComment = async(id)=>{

const text =
document
.getElementById("commentInput")
.value;

if(!text) return;

await updateDoc(
doc(db,"songs",id),
{
comments: arrayUnion(text)
}
);

closeModal();

};

/* DELETE */

window.deleteSong = async(id)=>{

const pass =
prompt("Password?");

if(pass !== "aletorma")
return;

await deleteDoc(
doc(db,"songs",id)
);

};

/* ADD SONG */

window.openAdd = ()=>{

const modal =
document.createElement("div");

modal.className = "modal";

modal.innerHTML = `

<div class="modalBox">

<h2>Add Song</h2>

<input
id="t"
placeholder="Song title">

<input
id="a"
placeholder="Artist">

<input
id="l"
placeholder="YouTube link">

<input
id="p"
type="password"
placeholder="Password">

<div class="modalButtons">

<button onclick="submitSong()">
Add
</button>

<button onclick="closeModal()">
Close
</button>

</div>

</div>

`;

document.body.appendChild(modal);

};

/* SUBMIT */

window.submitSong = async()=>{

const pass =
document.getElementById("p")
.value;

if(pass !== "kingphonk")
return;

const title =
document.getElementById("t")
.value;

const artist =
document.getElementById("a")
.value;

const link =
document.getElementById("l")
.value;

if(!title || !artist || !link)
return;

await addDoc(songsRef,{
title,
artist,
link,
likes:0,
comments:[]
});

closeModal();

};

/* CLOSE */

window.closeModal = ()=>{

document
.querySelectorAll(".modal")
.forEach(m=>m.remove());

};

/* INTRO */

setTimeout(()=>{

document
.getElementById("intro")
.classList.add("hidden");

setTimeout(()=>{

document
.getElementById("app")
.classList.remove("hidden");

},1200);

},1500);

</script>

</body>
</html>
